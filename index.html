<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: black;
}

/* VIDEO */
video {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: translate(-50%, -50%);
    z-index: -2;
    opacity: 1;
    transition: opacity 1s ease-in-out;
}

/* overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* CENTER CONTENT */
.content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    width: 100%;
    padding: 0 15px;
    text-align: center;
}

h1 {
    font-size: 50px;
}

/* typing text */
#typing {
    font-size: 22px;
    display: inline-block;
    white-space: normal;
    max-width: 90%;
}

/* buttons */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin: 20px;
}

#yesBtn {
    background: white;
    color: #ff4d6d;
}

#noBtn {
    background: #ff4d6d;
    color: white;
    position: absolute;
}

/* hearts */
.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* YES popup */
#yesPopup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    color: #ff4d6d;
    font-family: 'Brush Script MT', cursive;
    opacity: 0;
    z-index: 999;
    pointer-events: none;
    transition: opacity 2s ease-in-out;
}

/* Go Button */
#goBtn {
    font-size: 40px;
    padding: 20px 50px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    background: white;
    color: #ff4d6d;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* 📱 MOBILE FIX */
@media only screen and (max-width: 600px) {

    h1 {
        font-size: 30px;
    }

    #typing {
        font-size: 18px;
    }

    #yesBtn, #noBtn {
        font-size: 16px;
        padding: 10px 20px;
    }

    #goBtn {
        font-size: 28px;
        padding: 15px 40px;
    }

    #yesPopup {
        font-size: 34px;
    }

    video {
        width: 100%;
        height: auto;
        object-fit: contain;
        background: black;
    }
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted></video>
<div class="overlay"></div>

<div class="content">
<h1>I'm Really Sorry Manika 😔❤️</h1>
<p id="typing"></p>

<br>
<button id="yesBtn" onclick="yesClick()">Yes 🥺</button>
<button id="noBtn">No 😒</button>
</div>

<!-- Background music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- YES popup -->
<div id="yesPopup">Aww 🥺❤️ Thank you!! I love you forever 💖</div>

<!-- Go Button -->
<button id="goBtn" onclick="startEverything()">Go</button>

<script>
// VIDEO LIST
const videos = ["video1.mp4", "video2.mp4"];
let current = 0;

const video = document.getElementById("bgVideo");
const bgMusic = document.getElementById("bgMusic");
const content = document.querySelector(".content");
const goBtn = document.getElementById("goBtn");

let heartsInterval;

// typing
const text = "Sudu nona... please forgive me 🥺💖 I love you so much...";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

// start all
function startEverything() {
    goBtn.style.display = "none";
    content.style.display = "block";

    bgMusic.play();

    video.src = videos[current];
    video.play();

    video.addEventListener("ended", () => {
        video.style.opacity = 0;

        setTimeout(() => {
            current = (current + 1) % videos.length;
            video.src = videos[current];
            video.play();
            video.style.opacity = 1;
        }, 1000);
    });

    typing();
    heartsInterval = setInterval(createHeart, 300);
}

// YES
function yesClick() {
    const popup = document.getElementById("yesPopup");
    popup.style.opacity = 1;

    clearInterval(heartsInterval);
    heartsInterval = setInterval(createHeart, 150);
}

// NO move
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
</script>

</body>
</html>
